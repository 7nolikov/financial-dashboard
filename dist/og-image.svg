<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="45%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="incomeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="chartClip">
      <rect x="60" y="280" width="720" height="240"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="white" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Chart area background -->
  <rect x="55" y="275" width="730" height="255" rx="12" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Income area chart (clipped) -->
  <g clip-path="url(#chartClip)">
    <path d="M60,490 C100,480 130,460 170,440 C220,415 260,410 310,390 C360,370 400,350 450,320 C500,290 550,295 600,310 C650,325 680,340 730,340 C760,340 760,530 60,530 Z"
          fill="url(#incomeGrad)"/>
    <path d="M60,490 C100,480 130,460 170,440 C220,415 260,410 310,390 C360,370 400,350 450,320 C500,290 550,295 600,310 C650,325 680,340 730,340"
          fill="none" stroke="#22c55e" stroke-width="2.5" stroke-opacity="0.9" filter="url(#glow)"/>
  </g>

  <!-- Investment area chart (clipped) -->
  <g clip-path="url(#chartClip)">
    <path d="M60,510 C120,505 160,500 200,490 C260,475 300,455 360,420 C420,385 460,350 520,310 C560,280 600,285 640,300 C680,315 710,320 760,325 C760,530 60,530 Z"
          fill="url(#chartGrad)"/>
    <path d="M60,510 C120,505 160,500 200,490 C260,475 300,455 360,420 C420,385 460,350 520,310 C560,280 600,285 640,300 C680,315 710,320 760,325"
          fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-opacity="0.9" filter="url(#glow)"/>
  </g>

  <!-- Net worth line -->
  <g clip-path="url(#chartClip)">
    <path d="M60,520 C130,515 170,510 230,500 C300,488 350,470 410,440 C470,410 510,370 570,330 C620,295 660,290 710,295 C740,298 760,300 780,302"
          fill="none" stroke="#a78bfa" stroke-width="3" stroke-opacity="0.95" filter="url(#glow)"/>
  </g>

  <!-- FIRE achievement marker -->
  <circle cx="580" cy="310" r="8" fill="#fbbf24" stroke="white" stroke-width="2" filter="url(#glow)"/>
  <line x1="580" y1="283" x2="580" y2="530" stroke="#fbbf24" stroke-width="1.5" stroke-opacity="0.5" stroke-dasharray="4 3"/>
  <rect x="540" y="263" width="82" height="22" rx="5" fill="#fbbf24" fill-opacity="0.9"/>
  <text x="581" y="278" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#1c1917">FIRE Age 52</text>

  <!-- Axis labels -->
  <text x="60" y="548" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white" fill-opacity="0.4">Age 20</text>
  <text x="240" y="548" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white" fill-opacity="0.4">Age 35</text>
  <text x="440" y="548" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white" fill-opacity="0.4">Age 50</text>
  <text x="640" y="548" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white" fill-opacity="0.4">Age 65</text>
  <text x="740" y="548" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white" fill-opacity="0.4">Age 80</text>

  <!-- Right panel - stats -->
  <rect x="840" y="275" width="315" height="255" rx="12" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.12" stroke-width="1"/>

  <!-- FIRE Number stat -->
  <text x="860" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="white" fill-opacity="0.5" letter-spacing="1">FIRE NUMBER</text>
  <text x="860" y="352" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="white">$1.2M</text>

  <line x1="860" y1="368" x2="1135" y2="368" stroke="white" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Progress bar -->
  <text x="860" y="393" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="white" fill-opacity="0.5" letter-spacing="1">PROGRESS TO FIRE</text>
  <rect x="860" y="402" width="275" height="8" rx="4" fill="white" fill-opacity="0.1"/>
  <rect x="860" y="402" width="178" height="8" rx="4" fill="#6366f1"/>
  <text x="860" y="428" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#818cf8">64.7%</text>
  <text x="980" y="428" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" fill-opacity="0.4">of $1.2M</text>

  <line x1="860" y1="442" x2="1135" y2="442" stroke="white" stroke-opacity="0.1" stroke-width="1"/>

  <!-- FIRE date stat -->
  <text x="860" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="white" fill-opacity="0.5" letter-spacing="1">FIRE DATE</text>
  <text x="860" y="498" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#34d399">Age 52</text>
  <text x="860" y="516" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" fill-opacity="0.4">13 years before standard retirement</text>

  <!-- Main headline -->
  <text x="60" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#6366f1" letter-spacing="2">FINANCIAL LIFE TRACKER</text>

  <!-- Hero text -->
  <text x="60" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="900" fill="white">See Your Entire</text>
  <text x="60" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="900">
    <tspan fill="#fbbf24">Financial </tspan><tspan fill="white">Future</tspan>
  </text>

  <!-- Feature pills -->
  <rect x="60" y="562" width="110" height="28" rx="14" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="115" y="581" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="white" fill-opacity="0.85">🔒 100% Private</text>

  <rect x="182" y="562" width="108" height="28" rx="14" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="236" y="581" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="white" fill-opacity="0.85">⚡ Zero Signup</text>

  <rect x="302" y="562" width="120" height="28" rx="14" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="362" y="581" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="white" fill-opacity="0.85">🔥 Find FIRE Date</text>

  <rect x="434" y="562" width="120" height="28" rx="14" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="494" y="581" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="white" fill-opacity="0.85">💸 Free Forever</text>

  <!-- URL -->
  <text x="1140" y="610" text-anchor="end" font-family="ui-monospace, monospace" font-size="13" fill="white" fill-opacity="0.3">7nolikov.github.io/financial-dashboard</text>
</svg>
